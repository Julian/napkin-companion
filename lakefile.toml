name = "Napkin"
version = "2026.5.1"
keywords = ["math", "textbook"]
defaultTargets = ["napkin"]
testDriver = "test"

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
maxSynthPendingDepth = 3
weak.verso.code.warnLineLength = 80

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.32.0-rc1"

[[require]]
name = "verso"
git = "https://github.com/leanprover/verso"
rev = "v4.32.0-rc1"

[[lean_lib]]
name = "Napkin"

# Holds the test runner and individual test modules. Not built by
# the default `lake build` target; only when `lake test` runs.
[[lean_lib]]
name = "Test"
roots = ["Test.Main", "Test.Fixture", "Test.CheckFixture", "Test.CheckSorry"]

[[lean_exe]]
name = "napkin"
root = "Render"
supportInterpreter = true

[[lean_exe]]
name = "figures"
root = "BuildFigures"
supportInterpreter = true

[[lean_exe]]
name = "chaptergraph"
root = "BuildChapterGraph"
supportInterpreter = true

# Test runner. Wired up as `testDriver` so `lake test` invokes it.
# Currently runs the render-diff check; new tests are registered in
# `Test/Main.lean`.
[[lean_exe]]
name = "test"
root = "Test.Main"
supportInterpreter = true
