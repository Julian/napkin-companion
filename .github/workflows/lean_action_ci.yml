name: Lean Action CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    permissions:
      contents: read # Required to check out the repository.
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9 # v1
        with:
          build: "false"  # `lake test` builds what it needs; skip the full book.
          test: "true"

  # Render the book and deploy to GitHub Pages. Only runs on pushes to
  # `main`, gated on the `test` job, so a broken render never lands on
  # the live site.
  deploy-book:
    name: Build and deploy book
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read # Required to check out the repository.
      pages: write # Required to deploy to GitHub Pages.
      id-token: write # Required for the OIDC token used by deploy-pages.
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9 # v1
        with:
          test: "false"  # Already covered by the `test` job.
      - name: Render book
        run: lake exe napkin --output _site
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: _site/html-multi
      - id: deploy
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
